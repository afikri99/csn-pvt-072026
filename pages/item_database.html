<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Database</title>
<style>
  * { box-sizing: border-box; }
  :root{
    --border:#e4e4e7;
    --border-strong:#d4d4d8;
    --text:#18181b;
    --text-muted:#71717a;
    --bg-hover:#fafafa;
    --accent:#18181b;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  header {
    margin-bottom: 28px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 13px;
    color: var(--text-muted);
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .controls input[type="text"] {
    flex: 1 1 260px;
    padding: 9px 12px;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    outline: none;
    color: var(--text);
    background: #fff;
  }
  .controls input[type="text"]:focus {
    border-color: #a1a1aa;
  }
  .controls select {
    padding: 9px 10px;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    outline: none;
    min-width: 170px;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead th {
    text-align: left;
    font-weight: 600;
    color: var(--text-muted);
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border-strong);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th .arrow { font-size: 10px; margin-left: 3px; opacity: 0.5; }
  tbody td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:hover { background: var(--bg-hover); }
  .id-col { color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .name-col { font-weight: 500; }
  .tag {
    display: inline-block;
    padding: 2px 7px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    font-size: 11.5px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .rc-col {
    color: var(--text-muted);
    font-size: 12.5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .pagination button {
    min-width: 32px;
    height: 32px;
    padding: 0 8px;
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--text);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .pagination button:hover:not(:disabled) { background: var(--bg-hover); }
  .pagination button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .pagination button:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .pagination .dots {
    padding: 0 4px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .pg-size {
    text-align: center;
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .pg-size select {
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    padding: 3px 6px;
    font-size: 12.5px;
    background: #fff;
    color: var(--text);
  }
  @media (max-width: 640px) {
    .rc-col, .id-col { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Item Database</h1>
    <div class="sub" id="subCount">memuat data...</div>
  </header>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Cari nama, ID, ClassName, atau resource name...">
    <select id="classFilter">
      <option value="">Semua ClassName</option>
    </select>
  </div>

  <div class="meta-row">
    <span id="resultInfo"></span>
    <span id="sortInfo"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th data-key="ID">ID<span class="arrow"></span></th>
        <th data-key="Name">Name<span class="arrow"></span></th>
        <th data-key="ClassName">ClassName<span class="arrow"></span></th>
        <th data-key="Category">Category<span class="arrow"></span></th>
        <th data-key="recourcename">Resource Name<span class="arrow"></span></th>
        <th data-key="InGameID">InGameID<span class="arrow"></span></th>
        <th data-key="Level">Level<span class="arrow"></span></th>
        <th data-key="ItemGrade">Grade<span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none;">Tidak ada item yang cocok.</div>

  <div class="pagination" id="pagination"></div>
  <div class="pg-size">
    Baris per halaman:
    <select id="pageSizeSelect">
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </div>
</div>

85","Name":"kronosagentcos_head2","recourcename":"kronosagentcos_head2","ClassName":"HeadCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9886","Name":"kronosagentcos_back2","recourcename":"kronosagentcos_back2","ClassName":"BackCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9895","Name":"coszsmegalodon","recourcename":"coszsmegalodon","ClassName":"PetCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9896","Name":"coszshelmet","recourcename":"coszshelmet","ClassName":"HeadCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9897","Name":"coszsscorpion","recourcename":"coszsscorpion","ClassName":"PelvisCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9903","Name":"y26danocoshead","recourcename":"y26danocoshead","ClassName":"HeadCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9904","Name":"y26danocospelvis","recourcename":"y26danocospelvis","ClassName":"PelvisCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9905","Name":"y26danocosback","recourcename":"y26danocosback","ClassName":"BackCostume","Category":"12","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9906","Name":"y26danospray","recourcename":"y26danospray","ClassName":"PeriodicItem","Category":"8","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9998","Name":"Letterk2 Tattoo","recourcename":"ttLetterk2","ClassName":"Tattoo","Category":"8","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""},{"ID":"9999","Name":"Letterk1 Tattoo","recourcename":"ttLetterk1","ClassName":"Tattoo","Category":"8","InGameID":"0","Level":"0","ItemGrade":"0","Weight":""}];

let filtered = ITEMS.slice();
let currentPage = 1;
let pageSize = 50;
let sortKey = 'ID';
let sortDir = 1; // 1 asc, -1 desc

const searchInput = document.getElementById('searchInput');
const classFilter = document.getElementById('classFilter');
const tableBody = document.getElementById('tableBody');
const pagination = document.getElementById('pagination');
const pageSizeSelect = document.getElementById('pageSizeSelect');
const resultInfo = document.getElementById('resultInfo');
const subCount = document.getElementById('subCount');
const emptyState = document.getElementById('emptyState');
const sortInfo = document.getElementById('sortInfo');

// populate classname filter
const classCounts = {};
ITEMS.forEach(it => {
  classCounts[it.ClassName] = (classCounts[it.ClassName] || 0) + 1;
});
Object.keys(classCounts).sort().forEach(cn => {
  const opt = document.createElement('option');
  opt.value = cn;
  opt.textContent = cn + ' (' + classCounts[cn] + ')';
  classFilter.appendChild(opt);
});

subCount.textContent = ITEMS.length.toLocaleString('id-ID') + ' item total';

function applyFilters() {
  const q = searchInput.value.trim().toLowerCase();
  const cls = classFilter.value;
  filtered = ITEMS.filter(it => {
    if (cls && it.ClassName !== cls) return false;
    if (!q) return true;
    return (
      it.Name.toLowerCase().includes(q) ||
      it.ID.toLowerCase().includes(q) ||
      it.ClassName.toLowerCase().includes(q) ||
      it.recourcename.toLowerCase().includes(q)
    );
  });
  sortFiltered();
  currentPage = 1;
  render();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    const na = parseFloat(va), nb = parseFloat(vb);
    const bothNum = !isNaN(na) && !isNaN(nb) && va !== '' && vb !== '';
    if (bothNum) {
      return (na - nb) * sortDir;
    }
    return va.toLowerCase().localeCompare(vb.toLowerCase()) * sortDir;
  });
}

function render() {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * pageSize;
  const pageItems = filtered.slice(start, start + pageSize);

  tableBody.innerHTML = '';
  emptyState.style.display = total === 0 ? 'block' : 'none';

  pageItems.forEach(it => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="id-col">' + esc(it.ID) + '</td>' +
      '<td class="name-col">' + esc(it.Name) + '</td>' +
      '<td><span class="tag">' + esc(it.ClassName) + '</span></td>' +
      '<td>' + esc(it.Category) + '</td>' +
      '<td class="rc-col">' + esc(it.recourcename) + '</td>' +
      '<td class="id-col">' + esc(it.InGameID) + '</td>' +
      '<td>' + esc(it.Level) + '</td>' +
      '<td>' + esc(it.ItemGrade) + '</td>';
    tableBody.appendChild(tr);
  });

  const from = total === 0 ? 0 : start + 1;
  const to = Math.min(start + pageSize, total);
  resultInfo.textContent = total === 0
    ? '0 hasil'
    : from.toLocaleString('id-ID') + '–' + to.toLocaleString('id-ID') + ' dari ' + total.toLocaleString('id-ID') + ' hasil';

  renderPagination(totalPages);
  updateSortHeaders();
}

function renderPagination(totalPages) {
  pagination.innerHTML = '';
  if (totalPages <= 1) return;

  const makeBtn = (label, page, opts = {}) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (opts.active) btn.classList.add('active');
    if (opts.disabled) btn.disabled = true;
    btn.addEventListener('click', () => {
      currentPage = page;
      render();
      window.scrollTo({top:0, behavior:'smooth'});
    });
    return btn;
  };

  pagination.appendChild(makeBtn('‹', currentPage - 1, { disabled: currentPage === 1 }));

  const pages = getPageRange(currentPage, totalPages);
  pages.forEach(p => {
    if (p === '...') {
      const span = document.createElement('span');
      span.className = 'dots';
      span.textContent = '…';
      pagination.appendChild(span);
    } else {
      pagination.appendChild(makeBtn(String(p), p, { active: p === currentPage }));
    }
  });

  pagination.appendChild(makeBtn('›', currentPage + 1, { disabled: currentPage === totalPages }));
}

function getPageRange(current, total) {
  const delta = 1;
  const range = [];
  const rangeWithDots = [];
  let l;

  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= current - delta && i <= current + delta)) {
      range.push(i);
    }
  }
  range.forEach(i => {
    if (l) {
      if (i - l === 2) {
        rangeWithDots.push(l + 1);
      } else if (i - l !== 1) {
        rangeWithDots.push('...');
      }
    }
    rangeWithDots.push(i);
    l = i;
  });
  return rangeWithDots;
}

function updateSortHeaders() {
  document.querySelectorAll('thead th').forEach(th => {
    const arrow = th.querySelector('.arrow');
    if (th.dataset.key === sortKey) {
      arrow.textContent = sortDir === 1 ? '▲' : '▼';
    } else {
      arrow.textContent = '';
    }
  });
}

function esc(v) {
  if (v === undefined || v === null) return '';
  return String(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortKey === key) {
      sortDir *= -1;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    sortFiltered();
    render();
  });
});

let searchTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 120);
});
classFilter.addEventListener('change', applyFilters);
pageSizeSelect.addEventListener('change', () => {
  pageSize = parseInt(pageSizeSelect.value, 10);
  currentPage = 1;
  render();
});

sortFiltered();
render();
</script>
